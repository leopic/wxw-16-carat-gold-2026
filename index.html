<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/pwa-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Tournament bracket tracker for wXw 16 Carat Gold 2026" />
    <meta name="theme-color" content="#d4a44a" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#b8892e" media="(prefers-color-scheme: light)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/pwa-192.png" />
    <title>wXw 16 Carat Gold 2026</title>
  </head>
  <body>
    <div id="root">
      <div class="splash">
        <h1 class="splash-title">wXw 16 Carat Gold 2026</h1>
        <div class="splash-spinner"></div>
      </div>
      <style>
        .splash{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;gap:1.5rem;background:#1c1c1c;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
        .splash-title{color:#d4a44a;font-size:1.375rem;font-weight:700;margin:0}
        .splash-spinner{width:2rem;height:2rem;border:3px solid #3a3a3a;border-top-color:#d4a44a;border-radius:50%;animation:sp .8s linear infinite}
        @keyframes sp{to{transform:rotate(360deg)}}
        @media(prefers-color-scheme:light){.splash{background:#f5f3ef}.splash-title{color:#b8892e}.splash-spinner{border-color:#d0ccc4;border-top-color:#b8892e}}
      </style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
